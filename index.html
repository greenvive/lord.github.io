<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Planner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="주요 메뉴">
        <div class="brand">
          <span class="brand-mark">P</span>
          <div>
            <strong>Personal Planner</strong>
            <span>오늘 중심 실행 관리</span>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item active" data-view="home" type="button">홈</button>
          <button class="nav-item" data-view="today" type="button">오늘</button>
          <button class="nav-item" data-view="tasks" type="button">할 일</button>
          <button class="nav-item" data-view="calendar" type="button">캘린더</button>
        </nav>

        <div class="sidebar-summary">
          <span>이번 달 완료율</span>
          <strong id="monthCompletion">0%</strong>
          <div class="progress-track" aria-hidden="true">
            <span id="monthCompletionBar"></span>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p id="todayLabel" class="eyebrow"></p>
            <h1 id="viewTitle">홈</h1>
          </div>
          <button id="openTaskForm" class="primary-button" type="button">태스크 추가</button>
        </header>

        <section id="homeView" class="view active-view" aria-labelledby="viewTitle">
          <div class="metric-grid">
            <article class="metric-panel">
              <span>오늘 완료율</span>
              <strong id="todayCompletion">0%</strong>
              <small id="todayCompletionDetail">0개 중 0개 완료</small>
            </article>
            <article class="metric-panel">
              <span>오늘 할 일</span>
              <strong id="todayTaskCount">0</strong>
              <small>예정 및 진행 중</small>
            </article>
            <article class="metric-panel">
              <span>미룬 태스크</span>
              <strong id="postponedCount">0</strong>
              <small>다시 배치할 일</small>
            </article>
            <article class="metric-panel">
              <span>마감 임박</span>
              <strong id="dueSoonCount">0</strong>
              <small>3일 이내 예정</small>
            </article>
          </div>

          <div class="dashboard-grid">
            <section class="panel">
              <div class="panel-heading">
                <h2>오늘의 집중 태스크</h2>
                <button class="text-button" data-view-link="today" type="button">오늘 보기</button>
              </div>
              <div id="focusTasks" class="task-list compact-list"></div>
            </section>

            <section class="panel">
              <div class="panel-heading">
                <h2>카테고리 현황</h2>
                <button class="text-button" data-view-link="calendar" type="button">캘린더 보기</button>
              </div>
              <div id="categorySummary" class="category-summary"></div>
            </section>
          </div>
        </section>

        <section id="todayView" class="view" aria-labelledby="viewTitle">
          <div class="split-layout">
            <section class="panel">
              <div class="panel-heading">
                <h2>오늘의 ToDo</h2>
                <span id="todayOpenCount" class="pill">0개</span>
              </div>
              <div id="todayTasks" class="task-list"></div>
            </section>

            <section class="panel">
              <div class="panel-heading">
                <h2>완료한 일</h2>
                <span id="todayDoneCount" class="pill">0개</span>
              </div>
              <div id="completedTasks" class="task-list compact-list"></div>
            </section>
          </div>
        </section>

        <section id="tasksView" class="view" aria-labelledby="viewTitle">
          <div class="toolbar">
            <label class="field">
              <span>검색</span>
              <input id="searchInput" type="search" placeholder="제목 또는 메모" />
            </label>
            <label class="field">
              <span>카테고리</span>
              <select id="categoryFilter"></select>
            </label>
            <label class="field">
              <span>상태</span>
              <select id="statusFilter">
                <option value="all">전체</option>
                <option value="planned">예정</option>
                <option value="in_progress">진행 중</option>
                <option value="completed">완료</option>
                <option value="postponed">미룸</option>
              </select>
            </label>
          </div>
          <section class="panel">
            <div class="panel-heading">
              <h2>전체 태스크</h2>
              <span id="filteredCount" class="pill">0개</span>
            </div>
            <div id="allTasks" class="task-list"></div>
          </section>
        </section>

        <section id="calendarView" class="view" aria-labelledby="viewTitle">
          <div class="calendar-actions">
            <button id="prevMonth" class="icon-button" type="button" aria-label="이전 달">‹</button>
            <h2 id="calendarTitle"></h2>
            <button id="nextMonth" class="icon-button" type="button" aria-label="다음 달">›</button>
          </div>
          <div class="calendar-layout">
            <section class="calendar-panel">
              <div class="weekday-grid" aria-hidden="true">
                <span>일</span>
                <span>월</span>
                <span>화</span>
                <span>수</span>
                <span>목</span>
                <span>금</span>
                <span>토</span>
              </div>
              <div id="calendarGrid" class="calendar-grid"></div>
            </section>
            <section class="panel selected-day-panel">
              <div class="panel-heading">
                <h2 id="selectedDateTitle">선택한 날짜</h2>
                <span id="selectedDateCount" class="pill">0개</span>
              </div>
              <div id="selectedDateTasks" class="task-list compact-list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <dialog id="taskDialog" class="task-dialog">
      <form id="taskForm" method="dialog">
        <div class="dialog-heading">
          <h2 id="taskFormTitle">태스크 추가</h2>
          <button id="closeTaskForm" class="icon-button" type="button" aria-label="닫기">×</button>
        </div>

        <input id="taskId" type="hidden" />

        <label class="field">
          <span>제목</span>
          <input id="taskTitle" type="text" required maxlength="80" placeholder="할 일을 입력하세요" />
        </label>

        <div class="form-grid">
          <label class="field">
            <span>날짜</span>
            <input id="taskDate" type="date" required />
          </label>
          <label class="field">
            <span>카테고리</span>
            <select id="taskCategory" required></select>
          </label>
        </div>
        <div class="form-grid">
          <label class="field">
            <span>우선순위</span>
            <select id="taskPriority">
              <option value="low">낮음</option>
              <option value="medium" selected>보통</option>
              <option value="high">높음</option>
            </select>
          </label>
          <label class="field">
            <span>예상 시간</span>
            <input id="taskEstimate" type="number" min="0" step="5" placeholder="분" />
          </label>
        </div>

        <label class="field">
          <span>메모</span>
          <textarea id="taskDescription" rows="3" maxlength="240" placeholder="선택 입력"></textarea>
        </label>

        <div class="dialog-actions">
          <button id="deleteTask" class="danger-button hidden" type="button">삭제</button>
          <span></span>
          <button class="secondary-button" type="button" id="cancelTaskForm">취소</button>
          <button class="primary-button" type="submit">저장</button>
        </div>
      </form>
    </dialog>

    <nav class="mobile-nav" aria-label="모바일 메뉴">
      <button class="mobile-nav-item active" data-view="home" type="button">홈</button>
      <button class="mobile-nav-item" data-view="today" type="button">오늘</button>
      <button class="mobile-nav-item" data-view="tasks" type="button">할 일</button>
      <button class="mobile-nav-item" data-view="calendar" type="button">캘린더</button>
    </nav>

    <script src="./app.js"></script>
  </body>
</html>
